<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock - Manage Categories</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .transition-theme {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-theme overflow-hidden selection:bg-primary-500 selection:text-white">

    <div class="flex h-screen w-full">
        <div id="sidebarOverlay"
            class="fixed inset-0 bg-slate-900/50 z-20 hidden lg:hidden backdrop-blur-sm transition-opacity"
            onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 transform -translate-x-full lg:translate-x-0 lg:static lg:flex flex-col transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between h-16 px-6 border-b border-slate-200 dark:border-slate-700">
                <div class="flex items-center gap-2 text-primary-600 dark:text-primary-500">
                    <i class="ph-fill ph-package text-3xl"></i>
                    <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">SmartStock</span>
                </div>
                <button class="lg:hidden text-slate-500 hover:text-slate-700 dark:hover:text-slate-300"
                    onclick="toggleSidebar()">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">Core</div>
                <a href="index.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-squares-four text-xl group-hover:scale-110 transition-transform"></i> Dashboard
                </a>
                <a href="products.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-cube text-xl group-hover:scale-110 transition-transform"></i> Inventory Items
                </a>
                <a href="categories.html"
                    class="flex items-center gap-3 px-3 py-2.5 bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400 rounded-lg font-medium group">
                    <i class="ph ph-folders text-xl group-hover:scale-110 transition-transform"></i> Categories
                </a>
                <a href="lowstock.html"
                    class="flex items-center justify-between px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <div class="flex items-center gap-3">
                        <i class="ph ph-warning-circle text-xl group-hover:scale-110 transition-transform"></i> <span
                            class="whitespace-nowrap">Stock Alerts</span>
                    </div>
                    <span id="navAlertCount" class="w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                </a>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 mt-6 px-2">Management
                </div>

                <a href="reports.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-chart-line-up text-xl group-hover:scale-110 transition-transform"></i> Reports
                </a>
                <a href="settings.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-gear text-xl group-hover:scale-110 transition-transform"></i> Settings
                </a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-700">
                <div onclick="window.location.href='settings.html'"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer transition-colors hover:bg-slate-100 dark:hover:bg-slate-700/50 group">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff"
                        class="sidebarProfileLogo w-9 h-9 rounded-full object-cover border border-slate-200 dark:border-slate-600">
                    <div class="flex-1 min-w-0">
                        <p class="sidebarProfileName text-sm font-bold text-slate-900 dark:text-white truncate">
                            Administrator</p>
                        <p class="sidebarCompanyName text-xs text-slate-500 dark:text-slate-400 truncate">SmartStock
                            Inc.</p>
                    </div>
                    <i class="ph ph-caret-right text-slate-400 group-hover:text-primary-500 transition-colors"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header
                class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 sm:px-6 shrink-0 transition-theme">
                <div class="flex items-center gap-4 flex-1">
                    <button class="lg:hidden text-slate-500 hover:text-slate-700" onclick="toggleSidebar()">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <div class="text-sm font-medium text-slate-500 dark:text-slate-400 hidden sm:block"
                        id="currentDate"></div>
                </div>
                <div class="flex-1 flex justify-center hidden sm:flex">
                    <h2 class="text-lg sm:text-xl font-bold tracking-tight text-slate-900 dark:text-white truncate" id="headerCompanyName"></h2>
                </div>
                <div class="flex items-center gap-3 sm:gap-5 flex-1 justify-end">
                    <button onclick="toggleDarkMode()"
                        class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                        <i id="themeIcon" class="ph ph-moon text-xl"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">

                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Category Management</h1>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Add and organize your product catalog
                            collections.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="deleteSelectedCategories()" id="deleteSelectedBtn"
                            class="hidden px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-sm shadow-red-500/30">
                            <i class="ph ph-trash text-lg"></i> Delete Selected
                        </button>
                        <button onclick="exportCategories()"
                            class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-sm shadow-emerald-500/30">
                            <i class="ph ph-upload-simple text-lg"></i> Export
                        </button>
                        <button onclick="document.getElementById('importCatFile').click()"
                            class="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-sm shadow-amber-500/30">
                            <i class="ph ph-download-simple text-lg"></i> Import
                        </button>
                        <input type="file" id="importCatFile" class="hidden" accept=".xlsx, .xls"
                            onchange="importCategories(event)">
                        <button onclick="openCategoryModal()"
                            class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-sm shadow-primary-500/30">
                            <i class="ph ph-plus-circle text-lg"></i> Create Category
                        </button>
                    </div>
                </div>

                <!-- Search Box -->
                <div
                    class="relative bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-2 mb-6">
                    <i
                        class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                    <input type="text" id="catSearchInput" placeholder="Search category name..."
                        class="w-full pl-10 pr-4 py-2 bg-transparent outline-none text-slate-900 dark:text-white placeholder-slate-400">
                </div>

                <!-- Categories Table -->
                <div
                    class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto p-2">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr
                                    class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200 dark:border-slate-700">
                                    <th class="px-6 py-4 font-medium w-10">
                                        <input type="checkbox" id="selectAllCategories"
                                            onchange="toggleSelectAllCategories()"
                                            class="w-4 h-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500">
                                    </th>
                                    <th class="px-6 py-4 font-medium">Category Name</th>
                                    <th class="px-6 py-4 font-medium text-right w-32">Total Items</th>
                                    <th class="px-6 py-4 font-medium text-right w-32">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="categoriesBody" class="divide-y divide-slate-200 dark:divide-slate-700 text-sm">
                                <!-- Data injected via categories.js -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Controls -->
                    <div id="paginationControls"
                        class="flex items-center justify-between px-6 py-3 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                        <div class="text-sm text-slate-500 dark:text-slate-400">
                            Showing <span id="pageStart" class="font-medium text-slate-900 dark:text-white">0</span> to
                            <span id="pageEnd" class="font-medium text-slate-900 dark:text-white">0</span> of <span
                                id="totalItems" class="font-medium text-slate-900 dark:text-white">0</span> results
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="firstPage()" id="firstPageBtn"
                                class="px-3 py-1 border border-slate-200 dark:border-slate-700 rounded text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">First</button>
                            <button onclick="prevPage()" id="prevPageBtn"
                                class="px-3 py-1 border border-slate-200 dark:border-slate-700 rounded text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Previous</button>
                            <button onclick="nextPage()" id="nextPageBtn"
                                class="px-3 py-1 border border-slate-200 dark:border-slate-700 rounded text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Next</button>
                            <button onclick="lastPage()" id="lastPageBtn"
                                class="px-3 py-1 border border-slate-200 dark:border-slate-700 rounded text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Last</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal"
        class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-sm p-6 m-4 shadow-xl border border-slate-200 dark:border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Create New
                    Category</h2>
                <button onclick="closeCategoryModal()"
                    class="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            <form id="categoryForm" class="space-y-4">
                <input type="hidden" id="categoryId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Category
                        Name</label>
                    <input type="text" id="categoryName" required placeholder="e.g. Electronics, Beverages"
                        class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none text-slate-900 dark:text-white">
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-700 mt-6">
                    <button type="button" onclick="closeCategoryModal()"
                        class="px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 transition">Cancel</button>
                    <button type="submit"
                        class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition shadow-sm">Save</button>
                </div>
            </form>
        </div>
    </div>



    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('ph-moon', 'ph-sun');
        } else {
            document.documentElement.classList.remove('dark')
        }

        function toggleDarkMode() {
            const htmlEl = document.documentElement;
            const iconEl = document.getElementById('themeIcon');
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                iconEl.classList.replace('ph-sun', 'ph-moon');
            } else {
                htmlEl.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                iconEl.classList.replace('ph-moon', 'ph-sun');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/categories.js"></script>
</body>

</html>
