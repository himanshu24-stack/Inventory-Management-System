<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock - Point of Sale</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .transition-theme {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
    </style>
</head>

<body
    class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-theme overflow-hidden selection:bg-primary-500 selection:text-white">

    <div class="flex h-screen w-full">
        <div id="sidebarOverlay"
            class="fixed inset-0 bg-slate-900/50 z-20 hidden lg:hidden backdrop-blur-sm transition-opacity"
            onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 transform -translate-x-full lg:translate-x-0 lg:static lg:flex flex-col transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between h-16 px-6 border-b border-slate-200 dark:border-slate-700">
                <div class="flex items-center gap-2 text-primary-600 dark:text-primary-500">
                    <i class="ph-fill ph-package text-3xl"></i>
                    <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">SmartStock</span>
                </div>
                <button class="lg:hidden text-slate-500 hover:text-slate-700 dark:hover:text-slate-300"
                    onclick="toggleSidebar()">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">Core</div>
                <a href="index.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-squares-four text-xl group-hover:scale-110 transition-transform"></i> Dashboard
                </a>
                <a href="products.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-cube text-xl group-hover:scale-110 transition-transform"></i> Inventory Items
                </a>
                <a href="categories.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-folders text-xl group-hover:scale-110 transition-transform"></i> Categories
                </a>
                <a href="lowstock.html"
                    class="flex items-center justify-between px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <div class="flex items-center gap-3">
                        <i class="ph ph-warning-circle text-xl group-hover:scale-110 transition-transform"></i> <span class="whitespace-nowrap">Stock Alerts</span>
                    </div>
                    <span id="navAlertCount" class="w-2.5 h-2.5 bg-red-500 rounded-full hidden"></span>
                </a>
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 mt-6 px-2">Management
                </div>
                <a href="sales.html"
                    class="flex items-center gap-3 px-3 py-2.5 bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400 rounded-lg font-medium group">
                    <i class="ph ph-arrows-left-right text-xl group-hover:scale-110 transition-transform"></i> Point of
                    Sale
                </a>
                <a href="reports.html"
                    class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-700/50 dark:hover:text-white rounded-lg font-medium transition-colors group">
                    <i class="ph ph-chart-line-up text-xl group-hover:scale-110 transition-transform"></i> Reports
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header
                class="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 sm:px-6 shrink-0 transition-theme">
                <div class="flex items-center gap-4 flex-1">
                    <button class="lg:hidden text-slate-500 hover:text-slate-700" onclick="toggleSidebar()">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <div class="text-sm font-medium text-slate-500 dark:text-slate-400 hidden sm:block"
                        id="currentDate"></div>
                </div>
                <div class="flex-1 flex justify-center hidden sm:flex">
                    <h2 class="text-lg sm:text-xl font-bold tracking-tight text-slate-900 dark:text-white truncate" id="headerCompanyName"></h2>
                </div>
                <div class="flex items-center gap-3 sm:gap-5 flex-1 justify-end">
                    <button onclick="toggleDarkMode()"
                        class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                        <i id="themeIcon" class="ph ph-moon text-xl"></i>
                    </button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">
                <div class="flex flex-col lg:flex-row gap-6 h-full">

                    <!-- Left: Products Catalog -->
                    <div class="w-full lg:w-2/3 flex flex-col gap-4">
                        <div class="flex items-center justify-between">
                            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Point of Sale</h1>
                        </div>

                        <!-- Search Box -->
                        <div
                            class="relative bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-2">
                            <i
                                class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="text" id="posSearch" placeholder="Search product by name or barcode..."
                                class="w-full pl-10 pr-4 py-2 bg-transparent outline-none text-slate-900 dark:text-white placeholder-slate-400">
                        </div>

                        <!-- Product Table Grid -->
                        <div
                            class="flex-1 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex flex-col">
                            <div class="overflow-y-auto flex-1">
                                <table class="w-full text-left border-collapse">
                                    <thead class="sticky top-0 bg-slate-50 dark:bg-slate-800/90 backdrop-blur-md z-10">
                                        <tr
                                            class="text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200 dark:border-slate-700">
                                            <th class="px-6 py-4 font-medium">Product</th>
                                            <th class="px-6 py-4 font-medium">Price</th>
                                            <th class="px-6 py-4 font-medium text-center">Stock</th>
                                            <th class="px-6 py-4 font-medium text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="posProductList"
                                        class="divide-y divide-slate-200 dark:divide-slate-700 text-sm">
                                        <!-- Products injected here by sales.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Shopping Cart -->
                    <div class="w-full lg:w-1/3 flex flex-col gap-4">
                        <div
                            class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-full overflow-hidden">
                            <!-- Cart Header -->
                            <div
                                class="p-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                                <h1 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">
                                    <i class="ph ph-shopping-cart text-primary-500 text-xl"></i> Current Sale
                                </h1>
                            </div>

                            <!-- Cart Items -->
                            <div class="flex-1 overflow-y-auto p-4">
                                <table class="w-full text-left border-collapse">
                                    <tbody id="cartList"
                                        class="divide-y divide-slate-100 dark:divide-slate-700/50 text-sm">
                                        <!-- Cart Items injected here by sales.js -->
                                    </tbody>
                                </table>
                                <div id="emptyCartMsg" class="text-center text-slate-400 text-sm mt-10">
                                    <i class="ph ph-shopping-bag text-4xl text-slate-300 dark:text-slate-600 mb-2"></i>
                                    <p>Your cart is empty.</p>
                                </div>
                            </div>

                            <!-- Cart Summary & Actions -->
                            <div
                                class="p-5 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 space-y-4">
                                <div
                                    class="flex justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                    <span
                                        class="text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase text-xs">Total
                                        Amount</span>
                                    <span id="cartTotal"
                                        class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">$0.00</span>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onclick="printInvoice()"
                                        class="py-3 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition flex items-center justify-center gap-2 font-medium shadow-sm">
                                        <i class="ph ph-printer text-lg"></i> Receipt
                                    </button>
                                    <button id="checkoutBtn" onclick="checkout()"
                                        class="py-3 px-4 bg-primary-600 hover:bg-primary-700 text-white rounded-xl transition flex items-center justify-center gap-2 font-medium shadow-sm shadow-primary-500/30">
                                        <i class="ph ph-check-circle text-lg"></i> Checkout
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('ph-moon', 'ph-sun');
        } else {
            document.documentElement.classList.remove('dark')
        }

        function toggleDarkMode() {
            const htmlEl = document.documentElement;
            const iconEl = document.getElementById('themeIcon');
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                iconEl.classList.replace('ph-sun', 'ph-moon');
            } else {
                htmlEl.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                iconEl.classList.replace('ph-moon', 'ph-sun');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/sales.js"></script>
</body>

</html>
